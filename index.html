<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Addons de Minecraft</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(rgba(18, 10, 28, 0.85), rgba(18, 10, 28, 0.95)), 
                        url('https://images.unsplash.com/photo-1627856013091-fed6e4e30025?q=80&w=1200&auto=format&fit=crop') center/cover fixed;
            color: #f0e6ff;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: #b983ff;
            text-shadow: 0 0 15px rgba(185, 131, 255, 0.6), 3px 3px 0px #3a1c6a;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            color: #a19bb0;
            margin-top: 0.5rem;
        }

        .addons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .addon-card {
            background: rgba(32, 20, 50, 0.65);
            border: 2px solid #8a4fff;
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 15px rgba(138, 79, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        .addon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(168, 119, 255, 0.8), inset 0 0 10px rgba(168, 119, 255, 0.3);
            border-color: #b983ff;
        }

        .addon-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background: #120a1c;
        }

        .addon-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            loading: lazy; 
        }

        .addon-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .addon-title {
            font-size: 1.3rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .addon-description {
            color: #c3bed0;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .download-btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #6c25be, #4a158d);
            color: white;
            text-decoration: none;
            padding: 0.8rem;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            border: 1px solid #9d56ff;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #823cd0, #5c1fa9);
            box-shadow: 0 0 15px rgba(157, 86, 255, 0.6);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <header>
        <h1>Mis Addons</h1>
        <p>Descarga directa desde la nube de GitHub</p>
    </header>

    <main class="addons-grid" id="addons-container"></main>

    <script>
        // --- CONFIGURACIÓN DE ADDONS DESDE TU NUBE EN GITHUB ---
        const misAddons = [
            {
                titulo: "Mutant Creatures Addon",
                descripcion: "Agrega criaturas mutantes gigantes con animaciones épicas y nuevos ataques.",
                imagen: "images/mutante.jpg",           // Guardada en tu nube (carpeta images)
                linkDescarga: "addons/mutante.mcaddon"  // Guardado en tu nube (carpeta addons)
            },
            {
                titulo: "More Swords & Ores",
                descripcion: "Nuevos minerales en las cuevas y espadas con poderes mágicos.",
                imagen: "images/espadas.jpg",           // Guardada en tu nube (carpeta images)
                linkDescarga: "addons/espadas.mcaddon"  // Guardado en tu nube (carpeta addons)
            }
        ];

        function cargarAddons() {
            const contenedor = document.getElementById('addons-container');
            let contenido = '';

            misAddons.forEach(addon => {
                contenido += `
                    <article class="addon-card">
                        <div class="addon-image-wrapper">
                            <img src="${addon.imagen}" alt="${addon.titulo}" onerror="this.src='https://placehold.co/600x337/201432/8a4fff?text=Imagen+No+Encontrada'">
                        </div>
                        <div class="addon-info">
                            <h2 class="addon-title">${addon.titulo}</h2>
                            <p class="addon-description">${addon.descripcion}</p>
                            <!-- El atributo download obliga al navegador a descargar el archivo en vez de abrirlo como texto -->
                            <a href="${addon.linkDescarga}" download class="download-btn">Descargar (.mcaddon)</a>
                        </div>
                    </article>
                `;
            });

            contenedor.innerHTML = contenido;
        }

        document.addEventListener('DOMContentLoaded', cargarAddons);
    </script>
</body>
      </html>
